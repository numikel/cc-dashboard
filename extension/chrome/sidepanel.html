<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CC dashboard</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <div class="hero-content">
          <p class="eyebrow">Claude Code analytics</p>
          <h1>CC dashboard</h1>
          <p id="statusText" class="status">Checking local service...</p>
        </div>
        <div class="hero-menu">
          <button
            id="settingsTrigger"
            type="button"
            class="icon-button"
            aria-label="Settings"
            aria-haspopup="dialog"
            aria-expanded="false"
            aria-controls="settingsPanel"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
              focusable="false"
            >
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          </button>
          <div
            id="settingsPanel"
            class="settings-panel"
            role="dialog"
            aria-labelledby="settingsPanelTitle"
            hidden
          >
            <h2 id="settingsPanelTitle" class="settings-panel-title">Settings</h2>
            <label for="baseUrl">Local API URL</label>
            <div class="settings-row">
              <input id="baseUrl" type="url" autocomplete="off" spellcheck="false" />
              <button id="saveUrl" type="button">Save</button>
            </div>
            <a
              id="openDashboard"
              class="settings-panel-link"
              href="http://localhost:3000"
              target="_blank"
              rel="noreferrer"
              >Open full dashboard ↗</a
            >
          </div>
        </div>
      </header>

      <section class="panel" aria-labelledby="usageHeading">
        <div class="panel-heading">
          <h2 id="usageHeading">Plan usage</h2>
          <span id="usageSource">-</span>
        </div>
        <div id="usageRows" class="stack"></div>
      </section>

      <section class="grid" aria-label="Overview">
        <article class="card">
          <span>Sessions</span>
          <strong id="sessions">-</strong>
        </article>
        <article class="card">
          <span>Active</span>
          <strong id="activeSessions">-</strong>
        </article>
        <article class="card">
          <span>Total tokens</span>
          <strong id="totalTokens">-</strong>
        </article>
        <article class="card">
          <span>Top model</span>
          <strong id="topModel">-</strong>
        </article>
      </section>

      <section class="panel" aria-labelledby="activityHeading">
        <div class="panel-heading">
          <h2 id="activityHeading">Active sessions</h2>
          <button id="syncNow" type="button">Sync</button>
        </div>
        <div id="activeList" class="stack"></div>
        <p id="syncStatus" class="muted"></p>
      </section>
    </main>
    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
